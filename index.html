    <title>ArbNoor - Islamic Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              cream: {
                50: '#FDFCFB',
                100: '#F7F5F0',
                200: '#EBE5DA',
                300: '#D6CFC4',
              },
              charcoal: {
                800: '#4A4036',
                900: '#2C241B',
              },
              gold: {
                400: '#D4AF37',
                500: '#C5A028',
              },
              // Keeping teal but warming it up slightly for accents
              teal: {
                50: '#F0FDFA',
                100: '#CCFBF1',
                400: '#2DD4BF',
                600: '#0D9488',
                800: '#115E59',
                900: '#134E4A',
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Reference Theme: Warm Cream, Beige, Soft Glass */
        --bg-primary: #F7F5F0;
        --bg-secondary: #EBE5DA;
        --text-primary: #4A4036; /* Warm Charcoal */
        --text-secondary: #8C847C;
        
        /* Glassmorphism Variables */
        --glass-bg: rgba(255, 255, 255, 0.45);
        --glass-border: rgba(255, 255, 255, 0.6);
        --glass-shadow: 0 8px 32px -4px rgba(74, 64, 54, 0.05);
        --glass-blur: blur(16px);
      }

      html.dark {
        /* Dark Mode: Deep Warm Grey/Bronze */
        --bg-primary: #1C1917; 
        --bg-secondary: #292524;
        --text-primary: #F5F5F4;
        --text-secondary: #A8A29E;

        --glass-bg: rgba(41, 37, 36, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      }
      
      body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.5s ease, color 0.5s ease;
        overflow-x: hidden;
      }
      
      /* Islamic Geometric Background Pattern */
      /* A subtle hexagonal/star pattern that fades into the cream background */
      .pattern-bg {
        background-color: var(--bg-primary);
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234A4036' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }

      html.dark .pattern-bg {
         background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }

      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow);
      }
      
      /* The "Reference Card" style - deeper blur, specific border */
      .glass-card {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 
          0 10px 40px -10px rgba(74, 64, 54, 0.08),
          inset 0 0 20px rgba(255, 255, 255, 0.5);
      }
      
      html.dark .glass-card {
        background: rgba(40, 40, 40, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 
          0 10px 40px -10px rgba(0, 0, 0, 0.3),
          inset 0 0 20px rgba(255, 255, 255, 0.05);
      }

      h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif;
        letter-spacing: 0.01em;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
